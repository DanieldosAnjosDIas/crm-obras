<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Obras · Dos Anjos Engenharia</title>
<script src="https://cdn.tailwindcss.com/3.4.1"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; }
  .kanban-col { min-height: 300px; }
  .card-drag { cursor: grab; }
  .card-drag:active { cursor: grabbing; }
  .sidebar-item { transition: all .15s; }
  .sidebar-item:hover { background: rgba(255,255,255,.12); }
  .sidebar-item.active { background: rgba(255,255,255,.2); border-left: 3px solid #fff; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .modal-bg { background: rgba(0,0,0,.5); backdrop-filter: blur(2px); }
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius:3px; }
  input, select, textarea { outline: none; }
  input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 2px #3b82f6; }

<body>

<div id="app"></div>

<script type="module">

const SUPABASE_URL = 'https://rvwvpuyisahqsvpgtygp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2d3ZwdXlpc2FocXN2cGd0eWdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDQzMzUsImV4cCI6MjA4Mjc4MDMzNX0.IZk5mH-kQ5dU02gh_aqj3wUqaXlVhL1CTP8fOF8mH8A';

const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ────────────────────────────────────
let state = {
  user: null, profile: null,
  view: 'dashboard',
  leads: [], clients: [], visits: [], quotes: [], quoteItems: {}, projects: [], tasks: {}, expenses: {},
  modal: null, modalData: null,
  loading: false, toast: null,
  dragLeadId: null
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ─── TOAST ───────────────────────────────────
function showToast(msg, type='success') {
  setState({ toast: { msg, type } });
  setTimeout(() => setState({ toast: null }), 3500);
}

// ─── API ─────────────────────────────────────
async function loadAll() {
  const [leads, clients, visits, quotes, projects] = await Promise.all([
    db.from('leads').select('*').order('created_at', { ascending: false }),
    db.from('clients').select('*').order('created_at', { ascending: false }),
    db.from('visits').select('*').order('scheduled_at'),
    db.from('quotes').select('*').order('created_at', { ascending: false }),
    db.from('projects').select('*').order('created_at', { ascending: false }),
  ]);
  setState({
    leads: leads.data || [],
    clients: clients.data || [],
    visits: visits.data || [],
    quotes: quotes.data || [],
    projects: projects.data || [],
  });
}

async function loadQuoteItems(quoteId) {
  const { data } = await db.from('quote_items').select('*').eq('quote_id', quoteId).order('sort_order');
  setState({ quoteItems: { ...state.quoteItems, [quoteId]: data || [] } });
}

async function loadProjectTasks(projectId) {
  const { data } = await db.from('project_tasks').select('*').eq('project_id', projectId).order('sort_order');
  setState({ tasks: { ...state.tasks, [projectId]: data || [] } });
}

async function loadProjectExpenses(projectId) {
  const { data } = await db.from('expenses').select('*').eq('project_id', projectId).order('expense_date', {ascending:false});
  setState({ expenses: { ...state.expenses, [projectId]: data || [] } });
}

// ─── AUTH ────────────────────────────────────
async function signIn(email, password) {
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { showToast(error.message, 'error'); return; }
  await afterLogin(data.user);
}

async function signUp(email, password, name) {
  const { data, error } = await db.auth.signUp({ email, password, options: { data: { name } } });
  if (error) { showToast(error.message, 'error'); return; }
  if (data.user) { showToast('Cadastro realizado! Verifique seu email.'); }
}

async function signOut() {
  await db.auth.signOut();
  setState({ user: null, profile: null, view: 'dashboard', leads: [], clients: [], visits: [], quotes: [], projects: [] });
}

async function afterLogin(user) {
  const { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single();
  setState({ user, profile });
  await loadAll();
}

// ─── LEAD ACTIONS ────────────────────────────
const LEAD_STAGES = [
  { key:'NEW', label:'Novo Lead', color:'bg-slate-100 text-slate-700', dot:'bg-slate-400' },
  { key:'CONTACTED', label:'Contato Feito', color:'bg-blue-100 text-blue-700', dot:'bg-blue-400' },
  { key:'VISIT_SCHEDULED', label:'Visita Agendada', color:'bg-yellow-100 text-yellow-700', dot:'bg-yellow-400' },
  { key:'VISIT_DONE', label:'Visita Realizada', color:'bg-orange-100 text-orange-700', dot:'bg-orange-400' },
  { key:'QUOTE_SENT', label:'Orçamento Enviado', color:'bg-purple-100 text-purple-700', dot:'bg-purple-400' },
  { key:'NEGOTIATING', label:'Negociação', color:'bg-pink-100 text-pink-700', dot:'bg-pink-400' },
  { key:'CONTRACT_SIGNED', label:'Contrato Fechado', color:'bg-green-100 text-green-700', dot:'bg-green-400' },
  { key:'LOST', label:'Perdido', color:'bg-red-100 text-red-700', dot:'bg-red-400' },
];

const SOURCE_LABELS = { WHATSAPP:'WhatsApp', PHONE:'Telefone', EMAIL:'E-mail', INSTAGRAM:'Instagram', REFERRAL:'Indicação', WEBSITE:'Site', OTHER:'Outro' };

async function saveLead(formData) {
  const isEdit = !!formData.id;
  const payload = { name:formData.name, phone:formData.phone, email:formData.email,
    property_address:formData.property_address, work_type:formData.work_type,
    source:formData.source, status:formData.status||'NEW', budget_estimate:formData.budget_estimate||null,
    notes:formData.notes, user_id: state.user.id };
  if (isEdit) {
    await db.from('leads').update(payload).eq('id', formData.id);
    showToast('Lead atualizado');
  } else {
    await db.from('leads').insert(payload);
    showToast('Lead criado');
  }
  await loadAll();
  setState({ modal: null });
}

async function updateLeadStatus(leadId, newStatus) {
  await db.from('leads').update({ status: newStatus }).eq('id', leadId);
  setState({ leads: state.leads.map(l => l.id === leadId ? { ...l, status: newStatus } : l) });
  // If closing deal, prompt to create client
  if (newStatus === 'CONTRACT_SIGNED') {
    const lead = state.leads.find(l => l.id === leadId);
    if (lead) openModal('convertLead', lead);
  }
}

async function deleteLead(id) {
  if (!confirm('Excluir este lead?')) return;
  await db.from('leads').delete().eq('id', id);
  setState({ leads: state.leads.filter(l => l.id !== id), modal: null });
  showToast('Lead excluído');
}

// ─── VISIT ACTIONS ────────────────────────────
async function saveVisit(formData) {
  const isEdit = !!formData.id;
  const payload = { lead_id:formData.lead_id, scheduled_at:formData.scheduled_at,
    observations:formData.observations, status:formData.status||'SCHEDULED', engineer_id:state.user.id };
  if (isEdit) {
    await db.from('visits').update(payload).eq('id', formData.id);
    showToast('Visita atualizada');
  } else {
    await db.from('visits').insert(payload);
    // Update lead status
    await db.from('leads').update({ status:'VISIT_SCHEDULED' }).eq('id', formData.lead_id);
    showToast('Visita agendada');
  }
  await loadAll();
  setState({ modal: null });
}

async function completeVisit(id) {
  await db.from('visits').update({ status:'DONE', completed_at: new Date().toISOString() }).eq('id', id);
  const v = state.visits.find(v => v.id === id);
  if (v) await db.from('leads').update({ status:'VISIT_DONE' }).eq('id', v.lead_id);
  await loadAll();
  showToast('Visita concluída');
}

// ─── QUOTE ACTIONS ────────────────────────────
async function saveQuote(formData) {
  const isEdit = !!formData.id;
  const payload = { lead_id:formData.lead_id, title:formData.title, status:'DRAFT',
    valid_until:formData.valid_until, overhead_pct:parseFloat(formData.overhead_pct)||15,
    profit_margin:parseFloat(formData.profit_margin)||20, notes:formData.notes, created_by:state.user.id,
    number: formData.number || `ORC-${new Date().getFullYear()}-${String(state.quotes.length+1).padStart(4,'0')}` };
  let quoteId = formData.id;
  if (isEdit) {
    await db.from('quotes').update(payload).eq('id', formData.id);
    showToast('Orçamento atualizado');
  } else {
    const { data } = await db.from('quotes').insert(payload).select().single();
    quoteId = data.id;
    showToast('Orçamento criado');
  }
  await loadAll();
  await loadQuoteItems(quoteId);
  setState({ modal: 'quoteEditor', modalData: { ...formData, id: quoteId } });
}

async function saveQuoteItem(quoteId, item) {
  if (item.id) {
    await db.from('quote_items').update(item).eq('id', item.id);
  } else {
    await db.from('quote_items').insert({ ...item, quote_id: quoteId });
  }
  await loadQuoteItems(quoteId);
}

async function deleteQuoteItem(quoteId, itemId) {
  await db.from('quote_items').delete().eq('id', itemId);
  await loadQuoteItems(quoteId);
}

function calcQuoteTotals(quoteId) {
  const items = state.quoteItems[quoteId] || [];
  const materials = items.filter(i=>i.category==='MATERIAL').reduce((s,i)=>s+i.quantity*i.unit_price,0);
  const labor = items.filter(i=>i.category!=='MATERIAL').reduce((s,i)=>s+i.quantity*i.unit_price,0);
  const subtotal = materials + labor;
  const q = state.quotes.find(q=>q.id===quoteId);
  if (!q) return { materials, labor, subtotal, total:subtotal };
  const total = subtotal * (1 + (q.overhead_pct||0)/100 + (q.profit_margin||0)/100);
  return { materials, labor, subtotal, total };
}

// ─── PROJECT ACTIONS ─────────────────────────
async function saveProject(formData) {
  const isEdit = !!formData.id;
  const payload = { name:formData.name, code:formData.code||`OBR-${new Date().getFullYear()}-${String(state.projects.length+1).padStart(4,'0')}`,
    status:formData.status||'PLANNING', address:formData.address,
    start_date:formData.start_date||null, end_date_planned:formData.end_date_planned||null,
    budget_approved:parseFloat(formData.budget_approved)||null,
    progress_pct:parseFloat(formData.progress_pct)||0,
    notes:formData.notes, engineer_id:state.user.id,
    client_id:formData.client_id||null };
  if (isEdit) {
    await db.from('projects').update(payload).eq('id', formData.id);
    showToast('Obra atualizada');
  } else {
    await db.from('projects').insert(payload);
    showToast('Obra criada');
  }
  await loadAll();
  setState({ modal: null });
}

async function saveTask(projectId, task) {
  if (task.id) {
    await db.from('project_tasks').update(task).eq('id', task.id);
  } else {
    await db.from('project_tasks').insert({ ...task, project_id: projectId, sort_order: (state.tasks[projectId]||[]).length });
  }
  await loadProjectTasks(projectId);
}

async function saveExpense(projectId, expense) {
  await db.from('expenses').insert({ ...expense, project_id: projectId, recorded_by: state.user.id });
  await loadProjectExpenses(projectId);
  showToast('Despesa registrada');
}

// ─── CLIENT ACTIONS ─────────────────────────
async function convertLeadToClient(lead) {
  const { data } = await db.from('clients').insert({
    lead_id: lead.id, name: lead.name, phone: lead.phone, email: lead.email, address: lead.property_address
  }).select().single();
  await db.from('leads').update({ status: 'CONTRACT_SIGNED' }).eq('id', lead.id);
  await loadAll();
  showToast('Cliente criado a partir do lead!');
  setState({ modal: null });
  return data;
}

// ─── MODAL ────────────────────────────────────
function openModal(name, data=null) {
  setState({ modal: name, modalData: data });
  if (name === 'quoteEditor' && data?.id) loadQuoteItems(data.id);
  if (name === 'projectDetail' && data?.id) { loadProjectTasks(data.id); loadProjectExpenses(data.id); }
}

// ─── FORMAT HELPERS ──────────────────────────
const fmt = n => n ? new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n) : 'R$ 0,00';
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '-';
const fmtDT = d => d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';

// ─── RENDER ──────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = state.user ? renderApp() : renderAuth();
  attachEvents();
}

// ─── AUTH PAGE ───────────────────────────────
function renderAuth() {

  return `

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🏗️</div>
      <h1 class="text-2xl font-bold text-[#1A3C6E]">CRM Obras</h1>
      <p class="text-slate-500 text-sm mt-1">Dos Anjos Engenharia</p>
    </div>
    <div class="flex bg-slate-100 rounded-lg p-1 mb-6">
      <button onclick="switchAuth('login')" class="flex-1 py-2 rounded-md text-sm font-medium transition ${!isSignup?'bg-white shadow text-[#1A3C6E]':'text-slate-500'}">Entrar</button>
      <button onclick="switchAuth('signup')" class="flex-1 py-2 rounded-md text-sm font-medium transition ${isSignup?'bg-white shadow text-[#1A3C6E]':'text-slate-500'}">Cadastrar</button>
    </div>
    <form onsubmit="handleAuth(event)" class="space-y-4">

      <input name="email" type="email" placeholder="seu@email.com" required class="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm" />
      <input name="password" type="password" placeholder="Senha" required class="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm" />
      <button type="submit" class="w-full bg-[#1A3C6E] text-white py-3 rounded-lg font-semibold hover:bg-[#1F6FBF] transition">
        ${isSignup ? 'Criar conta' : 'Entrar'}
      </button>
    </form>
    ${state.toast ? renderToast() : ''}
  </div>
</div>`;
}

// ─── MAIN APP ────────────────────────────────
function renderApp() {
  return `
<div class="flex h-screen overflow-hidden">
  ${renderSidebar()}
  <main class="flex-1 overflow-y-auto bg-slate-50">
    <div class="fade-in">
      ${renderView()}
    </div>
  </main>
</div>
${state.modal ? renderModal() : ''}
${state.toast ? `<div class="fixed bottom-4 right-4 z-50">${renderToast()}</div>` : ''}`;
}

  const nav = [
    { id:'dashboard', icon:'📊', label:'Dashboard' },

    { id:'visits', icon:'📅', label:'Visitas' },
    { id:'quotes', icon:'📋', label:'Orçamentos' },

    { id:'clients', icon:'👥', label:'Clientes' },
  ];
  return `
<aside class="w-56 flex-shrink-0 bg-[#1A3C6E] text-white flex flex-col">
  <div class="p-5 border-b border-white/10">
    <h1 class="font-bold text-lg">🏗️ CRM Obras</h1>
    <p class="text-xs text-blue-200 mt-0.5 truncate">${state.profile?.name || state.user?.email}</p>
  </div>
  <nav class="flex-1 p-3 space-y-0.5">
    ${nav.map(n=>`
      <button onclick="navigate('${n.id}')" class="sidebar-item w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-3 text-sm ${state.view===n.id?'active font-semibold':'text-blue-100'}">

function renderView() {
  const views = { dashboard: renderDashboard, leads: renderLeads, visits: renderVisits, quotes: renderQuotes, projects: renderProjects, clients: renderClients };
  return (views[state.view] || renderDashboard)();
}

// ─── HEADER ──────────────────────────────────
function pageHeader(title, subtitle, btn='') {
  return `<div class="bg-white border-b px-6 py-4 flex items-center justify-between">
    <div><h2 class="text-xl font-bold text-slate-800">${title}</h2>${subtitle?`<p class="text-sm text-slate-500">${subtitle}</p>`:''}</div>
    ${btn}
  </div>`;
}

// ─── DASHBOARD ───────────────────────────────
function renderDashboard() {
  const activeLeads = state.leads.filter(l=>!['CONTRACT_SIGNED','LOST'].includes(l.status)).length;
  const totalLeads = state.leads.length;
  const converted = state.leads.filter(l=>l.status==='CONTRACT_SIGNED').length;
  const convRate = totalLeads ? Math.round(converted/totalLeads*100) : 0;
  const activeProjects = state.projects.filter(p=>p.status==='IN_PROGRESS').length;
  const revenue = state.projects.reduce((s,p)=>s+(p.budget_approved||0),0);
  const pendingVisits = state.visits.filter(v=>v.status==='SCHEDULED').length;
  const kpis = [
    { icon:'🎯', label:'Leads Ativos', value: activeLeads, sub:`${totalLeads} total`, color:'bg-blue-50 text-blue-700' },
    { icon:'📈', label:'Conversão', value: convRate+'%', sub:`${converted} contratos`, color:'bg-green-50 text-green-700' },
    { icon:'🏗️', label:'Obras em Andamento', value: activeProjects, sub:`${state.projects.length} total`, color:'bg-orange-50 text-orange-700' },
    { icon:'💰', label:'Volume Contratado', value: fmt(revenue), sub:'Soma dos contratos', color:'bg-purple-50 text-purple-700' },
    { icon:'📅', label:'Visitas Pendentes', value: pendingVisits, sub:'Agendadas', color:'bg-yellow-50 text-yellow-700' },
    { icon:'📋', label:'Orçamentos', value: state.quotes.length, sub:`${state.quotes.filter(q=>q.status==='DRAFT').length} em rascunho`, color:'bg-slate-50 text-slate-700' },
  ];

  // Pipeline counts
  const stageCounts = {};
  LEAD_STAGES.forEach(s => stageCounts[s.key] = state.leads.filter(l=>l.status===s.key).length);

  // Recent leads
  const recentLeads = state.leads.slice(0,5);

  return `
<div>
  ${pageHeader('Dashboard','Visão geral da empresa')}
  <div class="p-6 space-y-6">
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      ${kpis.map(k=>`
        <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-2xl">${k.icon}</span>
            <span class="text-xs text-slate-500 font-medium uppercase tracking-wide">${k.label}</span>
          </div>
          <div class="text-2xl font-bold text-slate-800">${k.value}</div>
          <div class="text-xs text-slate-400 mt-1">${k.sub}</div>
        </div>`).join('')}
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
        <h3 class="font-semibold text-slate-700 mb-4">Pipeline de Leads</h3>
        <div class="space-y-2">
          ${LEAD_STAGES.map(s=>`
            <div class="flex items-center gap-3">
              <div class="w-3 h-3 rounded-full ${s.dot} flex-shrink-0"></div>
              <span class="text-sm text-slate-600 flex-1">${s.label}</span>
              <span class="text-sm font-bold text-slate-800">${stageCounts[s.key]||0}</span>
              <div class="w-24 bg-slate-100 rounded-full h-1.5">
                <div class="bg-[#1A3C6E] h-1.5 rounded-full" style="width:${totalLeads?Math.round((stageCounts[s.key]||0)/totalLeads*100):0}%"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
        <h3 class="font-semibold text-slate-700 mb-4">Leads Recentes</h3>
        ${recentLeads.length ? `<div class="space-y-3">
          ${recentLeads.map(l=>{
            const stage = LEAD_STAGES.find(s=>s.key===l.status);
            return `<div class="flex items-center gap-3 cursor-pointer hover:bg-slate-50 p-2 rounded-lg" onclick="openModal('leadDetail','${l.id}')">
              <div class="w-8 h-8 rounded-full bg-[#1A3C6E] text-white flex items-center justify-center text-xs font-bold flex-shrink-0">${l.name[0].toUpperCase()}</div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-slate-800 truncate">${l.name}</div>
                <div class="text-xs text-slate-400">${l.work_type||'Sem tipo'} · ${SOURCE_LABELS[l.source]||l.source}</div>
              </div>
              <span class="text-xs px-2 py-0.5 rounded-full ${stage?.color||'bg-slate-100'} whitespace-nowrap">${stage?.label||l.status}</span>
            </div>`;
          }).join('')}
        </div>` : `<p class="text-slate-400 text-sm text-center py-8">Nenhum lead ainda.<br/><button onclick="navigate('leads')" class="text-blue-500 hover:underline">Adicionar primeiro lead</button></p>`}
      </div>
    </div>

    ${state.projects.length ? `
    <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
      <h3 class="font-semibold text-slate-700 mb-4">Obras em Andamento</h3>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-green-400"></div>

function renderModal() {

    quoteEditor: renderQuoteEditorModal,

  };

function modalHeader(title, subtitle='') {
  return `<div class="flex items-center justify-between p-5 border-b border-slate-100">
    <div><h3 class="text-lg font-bold text-slate-800">${title}</h3>${subtitle?`<p class="text-sm text-slate-500">${subtitle}</p>`:''}</div>
    <button onclick="setState({modal:null})" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition text-lg">×</button>
  </div>`;
}

function inputField(label, name, type='text', value='', required=false, extra='') {
  return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}${required?'<span class="text-red-400">*</span>':''}</label>
    <input name="${name}" type="${type}" value="${value||''}" ${required?'required':''} ${extra} class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-300"/></div>`;
}

function selectField(label, name, options, value='') {
  return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}</label>
    <select name="${name}" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-300">
      ${options.map(o=>`<option value="${o.value}" ${value===o.value?'selected':''}>${o.label}</option>`).join('')}
    </select></div>`;
}

function textareaField(label, name, value='') {
  return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}</label>
    <textarea name="${name}" rows="3" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-300 resize-none">${value||''}</textarea></div>`;
}

window.handleAuth = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  if (state.authMode === 'signup') {
    await signUp(fd.get('email'), fd.get('password'), fd.get('name'));
  } else {
    await signIn(fd.get('email'), fd.get('password'));
  }
};

  e.preventDefault();
  const fd = new FormData(e.target);
  await saveLead(Object.fromEntries(fd));
};

  e.preventDefault();

  await saveVisit(Object.fromEntries(fd));
};

};

  e.dataTransfer.setData('leadId', leadId);
};

window.handleDrop = async (e, newStatus) => {
  e.preventDefault();
  const leadId = e.dataTransfer.getData('leadId');
  if (leadId) await updateLeadStatus(leadId, newStatus);
};

window.addQuoteItemRow = async (quoteId) => {
  await saveQuoteItem(quoteId, { description:'Novo item', category:'MATERIAL', unit:'un', quantity:1, unit_price:0 });
};

window.updateQuoteItemField = async (quoteId, itemId, field, value) => {
  const items = state.quoteItems[quoteId] || [];
  const item = items.find(i=>i.id===itemId);
  if (!item) return;
  const updated = { ...item, [field]: value };
  await db.from('quote_items').update({ [field]: value }).eq('id', itemId);
  setState({ quoteItems: { ...state.quoteItems, [quoteId]: items.map(i=>i.id===itemId?updated:i) } });
};

window.markQuoteSent = async (quoteId) => {
  await db.from('quotes').update({ status:'SENT' }).eq('id', quoteId);
  setState({ quotes: state.quotes.map(q=>q.id===quoteId?{...q,status:'SENT'}:q) });
  showToast('Orçamento marcado como enviado');
};

window.markQuoteApproved = async (quoteId) => {
  await db.from('quotes').update({ status:'APPROVED' }).eq('id', quoteId);
  setState({ quotes: state.quotes.map(q=>q.id===quoteId?{...q,status:'APPROVED'}:q) });
  showToast('Orçamento aprovado!');
};

window.addTaskRow = async (projectId) => {
  const name = prompt('Nome da etapa:');
  if (!name) return;
  await saveTask(projectId, { name, status:'PENDING', progress_pct:0 });
  const p = state.projects.find(pr=>pr.id===projectId);
  openModal('projectDetail', p);
};

window.updateTaskStatus = async (projectId, taskId, status) => {
  await db.from('project_tasks').update({ status, progress_pct: status==='DONE'?100:status==='IN_PROGRESS'?50:0 }).eq('id', taskId);
  await loadProjectTasks(projectId);
  const p = state.projects.find(pr=>pr.id===projectId);
  openModal('projectDetail', p);
};

window.openAddExpenseForm = (projectId) => {
  const el = document.getElementById(`expense-form-${projectId}`);
  if (el) el.classList.toggle('hidden');
};

window.submitExpense = async (projectId) => {
  const desc = document.getElementById(`exp-desc-${projectId}`)?.value;
  const amt = parseFloat(document.getElementById(`exp-amt-${projectId}`)?.value);
  const cat = document.getElementById(`exp-cat-${projectId}`)?.value;
  if (!desc || !amt) { showToast('Preencha descrição e valor', 'error'); return; }
  await saveExpense(projectId, { description:desc, amount:amt, category:cat, expense_date:new Date().toISOString().split('T')[0] });
  const p = state.projects.find(pr=>pr.id===projectId);
  openModal('projectDetail', p);
};

// ─── INIT ────────────────────────────────────
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    await afterLogin(session.user);
  } else {
    render();
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      await afterLogin(session.user);
    } else if (event === 'SIGNED_OUT') {
      setState({ user: null, profile: null });
    }
  });
}

init();
</script>

function calcQuoteTotals(quoteId) {
  const items = state.quoteItems[quoteId] || [];
  const materials = items.filter(i=>i.category==='MATERIAL').reduce((s,i)=>s+i.quantity*i.unit_price,0);
  const labor = items.filter(i=>i.category!=='MATERIAL').reduce((s,i)=>s+i.quantity*i.unit_price,0);
  const subtotal = materials + labor;
  const q = state.quotes.find(q=>q.id===quoteId);
  if (!q) return { materials, labor, subtotal, total:subtotal };
  const total = subtotal * (1 + (q.overhead_pct||0)/100 + (q.profit_margin||0)/100);
  return { materials, labor, subtotal, total };
}

              <div class="text-sm text-slate-500">${lead?.work_type||''} · ${lead?.property_address||''}</div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-green-400"></div>
        <h3 class="font-semibold text-slate-700 text-sm">Realizadas (${done.length})</h3>
      </div>
      <div class="divide-y divide-slate-50">
        ${done.slice(0,10).map(v=>{
          const lead = state.leads.find(l=>l.id===v.lead_id);
          return `<div class="px-4 py-3 flex items-center gap-3 opacity-70">
            <span class="text-green-500 text-lg">✓</span>

// ─── MODALS ──────────────────────────────────
function renderModal() {
  const modals = {
    leadForm: renderLeadFormModal,
    leadDetail: renderLeadDetailModal,
    visitForm: renderVisitFormModal,
    quoteForm: renderQuoteFormModal,
    quoteEditor: renderQuoteEditorModal,
    projectForm: renderProjectFormModal,
    projectDetail: renderProjectDetailModal,
    convertLead: renderConvertLeadModal,
  };
  const fn = modals[state.modal];
  if (!fn) return '';
  return `
<div class="fixed inset-0 z-40 flex items-center justify-center modal-bg p-4" onclick="if(event.target===this)setState({modal:null})">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto fade-in" onclick="event.stopPropagation()">
    ${fn()}
  </div>
</div>`;
}

function modalHeader(title, subtitle='') {
  return `<div class="flex items-center justify-between p-5 border-b border-slate-100">
    <div><h3 class="text-lg font-bold text-slate-800">${title}</h3>${subtitle?`<p class="text-sm text-slate-500">${subtitle}</p>`:''}</div>
    <button onclick="setState({modal:null})" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition text-lg">×</button>
  </div>`;
}

function inputField(label, name, type='text', value='', required=false, extra='') {
  return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}${required?'<span class="text-red-400">*</span>':''}</label>
    <input name="${name}" type="${type}" value="${value||''}" ${required?'required':''} ${extra} class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-300"/></div>`;
}

function selectField(label, name, options, value='') {
  return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}</label>
    <select name="${name}" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-300">
      ${options.map(o=>`<option value="${o.value}" ${value===o.value?'selected':''}>${o.label}</option>`).join('')}
    </select></div>`;
}

function textareaField(label, name, value='') {
  return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}</label>
    <textarea name="${name}" rows="3" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-300 resize-none">${value||''}</textarea></div>`;
}

function renderLeadFormModal() {

${modalHeader(d.id?'Editar Lead':'Novo Lead')}
<form onsubmit="handleLeadForm(event)" class="p-5 space-y-4">
  <div class="grid grid-cols-2 gap-4">
    ${inputField('Nome completo *','name','text',d.name,true)}
    ${inputField('Telefone','phone','tel',d.phone)}
  </div>
  <div class="grid grid-cols-2 gap-4">
    ${inputField('E-mail','email','email',d.email)}
    ${inputField('Tipo de obra','work_type','text',d.work_type)}
  </div>
  ${inputField('Endereço do imóvel','property_address','text',d.property_address)}
  <div class="grid grid-cols-2 gap-4">

window.openModalProject = (id) => {
  const p = state.projects.find(pr=>pr.id===id);
  openModal('projectDetail', p);
};
window.setState = setState;
window.deleteLead = deleteLead;
window.updateLeadStatus = updateLeadStatus;
window.completeVisit = completeVisit;
window.convertLeadToClient = convertLeadToClient;
window.deleteQuoteItem = deleteQuoteItem;

window.switchAuth = (mode) => setState({ authMode: mode });

window.handleAuth = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  if (state.authMode === 'signup') {
    await signUp(fd.get('email'), fd.get('password'), fd.get('name'));
  } else {
    await signIn(fd.get('email'), fd.get('password'));
  }
};

window.handleSignOut = signOut;

window.handleLeadForm = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await saveLead(Object.fromEntries(fd));
};

window.handleVisitForm = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await saveVisit(Object.fromEntries(fd));
};

window.handleQuoteForm = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await saveQuote(Object.fromEntries(fd));
};

window.handleProjectForm = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await saveProject(Object.fromEntries(fd));
};

window.handleDragStart = (e, leadId) => {
  e.dataTransfer.setData('leadId', leadId);
};

window.handleDrop = async (e, newStatus) => {
  e.preventDefault();
  const leadId = e.dataTransfer.getData('leadId');
  if (leadId) await updateLeadStatus(leadId, newStatus);
};

window.addQuoteItemRow = async (quoteId) => {
  await saveQuoteItem(quoteId, { description:'Novo item', category:'MATERIAL', unit:'un', quantity:1, unit_price:0 });
};

window.updateQuoteItemField = async (quoteId, itemId, field, value) => {
  const items = state.quoteItems[quoteId] || [];
  const item = items.find(i=>i.id===itemId);
  if (!item) return;
  const updated = { ...item, [field]: value };
  await db.from('quote_items').update({ [field]: value }).eq('id', itemId);
  setState({ quoteItems: { ...state.quoteItems, [quoteId]: items.map(i=>i.id===itemId?updated:i) } });
};

window.markQuoteSent = async (quoteId) => {
  await db.from('quotes').update({ status:'SENT' }).eq('id', quoteId);
  setState({ quotes: state.quotes.map(q=>q.id===quoteId?{...q,status:'SENT'}:q) });
  showToast('Orçamento marcado como enviado');
};

window.markQuoteApproved = async (quoteId) => {
  await db.from('quotes').update({ status:'APPROVED' }).eq('id', quoteId);
  setState({ quotes: state.quotes.map(q=>q.id===quoteId?{...q,status:'APPROVED'}:q) });
  showToast('Orçamento aprovado!');
};

window.addTaskRow = async (projectId) => {
  const name = prompt('Nome da etapa:');
  if (!name) return;
  await saveTask(projectId, { name, status:'PENDING', progress_pct:0 });
  const p = state.projects.find(pr=>pr.id===projectId);
  openModal('projectDetail', p);
};

window.updateTaskStatus = async (projectId, taskId, status) => {
  await db.from('project_tasks').update({ status, progress_pct: status==='DONE'?100:status==='IN_PROGRESS'?50:0 }).eq('id', taskId);
  await loadProjectTasks(projectId);
  const p = state.projects.find(pr=>pr.id===projectId);
  openModal('projectDetail', p);
};

window.openAddExpenseForm = (projectId) => {
  const el = document.getElementById(`expense-form-${projectId}`);
  if (el) el.classList.toggle('hidden');
};

window.submitExpense = async (projectId) => {
  const desc = document.getElementById(`exp-desc-${projectId}`)?.value;
  const amt = parseFloat(document.getElementById(`exp-amt-${projectId}`)?.value);
  const cat = document.getElementById(`exp-cat-${projectId}`)?.value;
  if (!desc || !amt) { showToast('Preencha descrição e valor', 'error'); return; }
  await saveExpense(projectId, { description:desc, amount:amt, category:cat, expense_date:new Date().toISOString().split('T')[0] });
  const p = state.projects.find(pr=>pr.id===projectId);
  openModal('projectDetail', p);
};

// ─── INIT ────────────────────────────────────
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    await afterLogin(session.user);
  } else {
    render();
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      await afterLogin(session.user);
    } else if (event === 'SIGNED_OUT') {
      setState({ user: null, profile: null });
    }
  });
}

init();
</script>
</body>
</html>
